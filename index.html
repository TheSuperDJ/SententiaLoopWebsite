<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SententiaLoop</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111c33;
      --text: #e5e7eb;
      --muted: #a1a1aa;
      --accent: #60a5fa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      color: var(--text);
      background: radial-gradient(circle at top, #1e293b, var(--bg));
    }

    .container {
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    .card {
      background: rgba(17, 28, 51, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    ul {
      list-style: none;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0;
    }

    li a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      background: rgba(96, 165, 250, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.25);
      transition: 0.2s ease;
    }

    li a:hover {
      background: rgba(96, 165, 250, 0.25);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>SententiaLoop</h1>

      <p>
        Offizielle Informationsseite der App <strong>SententiaLoop</strong>.
        <br/>
        Hier findest du rechtliche Informationen und wichtige Dokumente.
      </p>

      <ul>
        <li><a href="privacy.html">Datenschutzerklärung</a></li>
        <li><a href="impressum.html">Impressum</a></li>
      </ul>

      <footer>
        © 2026 SententiaLoop
      </footer>
    </div>

  </div>

</body>
</html>
